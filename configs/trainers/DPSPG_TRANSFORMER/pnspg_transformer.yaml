DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 32
  TEST:
    BATCH_SIZE: 1
  NUM_WORKERS: 8

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 2e-3
  MAX_EPOCH: 50
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 4
  WARMUP_TYPE: "linear"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 10

TEST:
  NO_TEST: False

MODEL:
  BACKBONE:
    NAME: "RN50"

TRAINER:
  SPG:
    POS_CTX_INIT: "a photo of a"
    NEG_CTX_INIT: "a photo without a"


# you can adjust alpha within [0, 1], and we found 0.2 is the optimal value
ALPHA: 0.2

# adjust early and late values according to the domain of the specific datasets, 
# for example, dataset terra_incognita's location_100 and location_38 domains can set early to 5, 
# and dataset pacs's cartoon domain can set late to 20
EARLY: 5
LATE: 20
